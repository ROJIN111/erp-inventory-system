spring.application.name=erp-inventory-system
spring.profiles.default=dev
spring.devtools.restart.enabled=false

server.port=${SERVER_PORT:8080}

mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.type-aliases-package=com.example.erpinventory.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true

spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Shanghai

app.security.jwt.secret=${APP_JWT_SECRET:your-secret-key-for-jwt-token-generation-your-secret-key}
app.security.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
app.security.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001}

app.seed.enabled=false


