spring.datasource.url=${DEV_DB_URL:jdbc:mysql://localhost:3306/erp_inventory?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
spring.datasource.username=${DEV_DB_USERNAME:root}
spring.datasource.password=${DEV_DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

logging.level.com.example.erpinventory=debug
logging.level.com.example.erpinventory.mapper=debug

spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

app.seed.enabled=true

