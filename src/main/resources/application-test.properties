spring.datasource.url=${TEST_DB_URL:${DEV_DB_URL:jdbc:mysql://localhost:3306/erp_inventory?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}}
spring.datasource.username=${TEST_DB_USERNAME:${DEV_DB_USERNAME:root}}
spring.datasource.password=${TEST_DB_PASSWORD:${DEV_DB_PASSWORD:root}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

logging.level.com.example.erpinventory=info
logging.level.com.example.erpinventory.mapper=warn

spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

app.seed.enabled=true

